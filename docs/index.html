<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>하루 이야기 — one day story</title>
<meta name="description" content="단편소설 연작 「하루 이야기」 목차">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #faf7f2;
    --paper: #fffdf9;
    --ink: #2b2722;
    --muted: #8a8074;
    --accent: #9a6a4f;
    --rule: #e4dcd0;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #16140f;
      --paper: #1d1a14;
      --ink: #e6ded2;
      --muted: #8d8374;
      --accent: #c89a7e;
      --rule: #34302a;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: "Noto Serif KR", serif;
    line-height: 1.9;
    -webkit-font-smoothing: antialiased;
  }
  .sheet {
    max-width: 38rem;
    margin: 0 auto;
    padding: 6rem 1.5rem 7rem;
    background: var(--paper);
    min-height: 100vh;
    box-shadow: 0 0 60px rgba(0,0,0,.04);
  }
  header { text-align: center; margin-bottom: 5rem; }
  .sub {
    display: block;
    font-size: .85rem;
    letter-spacing: .6em;
    margin-left: .6em;
    color: var(--accent);
    margin-bottom: 1.2rem;
    text-transform: uppercase;
  }
  h1 {
    font-size: 2.1rem;
    font-weight: 600;
    letter-spacing: .3em;
    margin: 0;
    margin-left: .3em;
  }
  ol.toc {
    list-style: none;
    margin: 0;
    padding: 0;
  }
  ol.toc li {
    border-bottom: 1px solid var(--rule);
  }
  ol.toc li:first-child { border-top: 1px solid var(--rule); }
  ol.toc a, ol.toc .pending {
    display: flex;
    align-items: baseline;
    gap: 1.2rem;
    padding: 1.6rem .5rem;
    text-decoration: none;
    color: var(--ink);
  }
  ol.toc a:hover { background: rgba(154,106,79,.06); }
  .num {
    font-size: .8rem;
    color: var(--accent);
    letter-spacing: .2em;
    min-width: 3em;
  }
  .t { font-size: 1.15rem; font-weight: 400; }
  .pending { color: var(--muted); cursor: default; }
  .pending .t::after {
    content: " — 준비 중";
    font-size: .8rem;
    letter-spacing: .1em;
  }
  footer {
    margin-top: 6rem;
    text-align: center;
    color: var(--muted);
    font-size: .85rem;
    letter-spacing: .15em;
  }
</style>
</head>
<body>
  <div class="sheet">
    <header>
      <span class="sub">one day story</span>
      <h1>하루 이야기</h1>
    </header>
    <ol class="toc">
      <li><span class="pending"><span class="num">001</span><span class="t">사십구일</span></span></li>
      <li><a href="002/"><span class="num">002</span><span class="t">반반(半半)</span></a></li>
      <li><span class="pending"><span class="num">003</span><span class="t">주식회사 죽음</span></span></li>
    </ol>
    <footer>短篇 連作</footer>
  </div>
</body>
</html>
